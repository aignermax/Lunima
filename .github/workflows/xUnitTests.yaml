name: 🔍 xUnit Tests

on:
  push:
  pull_request:

jobs:
  nunit_tests:
    name: 🔍 xUnit Tests
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: 'recursive'

      - name: 💽 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: 📦 Restore Dependencies
        run: dotnet restore

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔦 Install PhotonTorch (for Phase 3 export integration tests)
        run: |
          python -m pip install --upgrade pip
          pip install photontorch torch matplotlib

      - name: ⚡ Install OpenVAF (for Phase 4 Verilog-A export integration tests)
        run: |
          curl -L https://openva.fra1.digitaloceanspaces.com/openvaf_devel-x86_64-unknown-linux-gnu.tar.gz -o /tmp/openvaf.tar.gz
          mkdir -p /tmp/openvaf
          tar xf /tmp/openvaf.tar.gz -C /tmp/openvaf
          sudo install -m 755 /tmp/openvaf/openvaf /usr/local/bin/openvaf
          openvaf --help | head -3 || true

      - name: 🏃 Run xUnit Tests
        working-directory: UnitTests
        run: dotnet test --no-restore
