name: Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test ./UnitTests/UnitTests.csproj --no-restore --logger:trx

  build:
    name: Build ${{ matrix.rid }}
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: Connect-A-PIC-Pro-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Connect-A-PIC-Pro-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish
        run: >
          dotnet publish CAP.Desktop/CAP.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: Rename executable
        run: |
          cd publish
          if [ -f CAP.Desktop ]; then
            mv CAP.Desktop Connect-A-PIC-Pro
            chmod +x Connect-A-PIC-Pro
          fi
          if [ -f CAP.Desktop.exe ]; then
            mv CAP.Desktop.exe Connect-A-PIC-Pro.exe
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute release info
        id: info
        run: |
          # Extract version from csproj
          version=$(grep '<Version>' CAP.Desktop/CAP.Desktop.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/' | xargs)
          echo "version=$version" >> $GITHUB_OUTPUT

          # Determine tag based on trigger type
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Use the actual tag that triggered this workflow
            tag="${{ github.ref_name }}"
            echo "tag=$tag" >> $GITHUB_OUTPUT
            echo "Using existing tag: $tag"
          else
            # Manual workflow_dispatch - create build tag
            tag="v${version}-build.${{ github.run_number }}"
            echo "tag=$tag" >> $GITHUB_OUTPUT
            echo "Creating build tag: $tag"
          fi

          # Verify tag matches version (warning only, don't fail)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            if [ "$tag" != "v$version" ]; then
              echo "::warning::Tag '$tag' does not match csproj version 'v$version'"
            fi
          fi

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: Connect-A-PIC-Pro-win-x64
          path: win-x64

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: Connect-A-PIC-Pro-linux-x64
          path: linux-x64

      - name: Create archives
        run: |
          cd win-x64 && zip -r ../Connect-A-PIC-Pro-${{ steps.info.outputs.version }}-win-x64.zip . && cd ..
          cd linux-x64 && tar czf ../Connect-A-PIC-Pro-${{ steps.info.outputs.version }}-linux-x64.tar.gz . && cd ..

      - name: Generate Changelog
        id: changelog
        run: |
          # Get the previous tag
          git fetch --tags
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "build" | head -2 | tail -1)
          CURR_TAG="${{ steps.info.outputs.tag }}"

          echo "Generating changelog from $PREV_TAG to $CURR_TAG"

          # Get commits since last release tag
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log $PREV_TAG..$CURR_TAG --pretty=format:"- %s" --no-merges)
            COMMIT_COUNT=$(git rev-list --count $PREV_TAG..$CURR_TAG --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
            COMMIT_COUNT=$(git rev-list --count HEAD --no-merges)
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "^- (feat|feature|add|implement):" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- (fix|bugfix):" || true)
          IMPROVEMENTS=$(echo "$COMMITS" | grep -iE "^- (refactor|improve|update|enhance|chore):" || true)
          BREAKING=$(echo "$COMMITS" | grep -iE "BREAKING|breaking change" || true)
          OTHER=$(echo "$COMMITS" | grep -viE "^- (feat|feature|add|implement|fix|bugfix|refactor|improve|update|enhance|chore):" || true)

          # Build changelog sections
          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG+="### ✨ New Features"$'\n'"$FEATURES"$'\n\n'
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG+="### 🐛 Bug Fixes"$'\n'"$FIXES"$'\n\n'
          fi

          if [ -n "$IMPROVEMENTS" ]; then
            CHANGELOG+="### 🔧 Improvements"$'\n'"$IMPROVEMENTS"$'\n\n'
          fi

          if [ -n "$BREAKING" ]; then
            CHANGELOG+="### ⚠️ Breaking Changes"$'\n'"$BREAKING"$'\n\n'
          fi

          if [ -n "$OTHER" ] && [ $(echo "$OTHER" | wc -l) -gt 0 ]; then
            CHANGELOG+="### 📝 Other Changes"$'\n'"$OTHER"$'\n\n'
          fi

          # Add commit summary
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG+="---"$'\n'"**$COMMIT_COUNT commits** since $PREV_TAG"
          else
            CHANGELOG+="---"$'\n'"**$COMMIT_COUNT commits** in this release"
          fi

          # Save to output (use delimiter for multiline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: Connect-A-PIC Pro v${{ steps.info.outputs.version }}
          body: |
            ## Connect-A-PIC Pro v${{ steps.info.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ## 📦 Installation

            ### Windows
            1. Download `Connect-A-PIC-Pro-${{ steps.info.outputs.version }}-win-x64.zip`
            2. Extract and run `Connect-A-PIC-Pro.exe`

            ### Linux
            1. Download `Connect-A-PIC-Pro-${{ steps.info.outputs.version }}-linux-x64.tar.gz`
            2. Extract: `tar xzf Connect-A-PIC-Pro-*.tar.gz`
            3. Run: `./Connect-A-PIC-Pro`

            No .NET installation required — everything is included.

            ---
            **Commit:** ${{ github.sha }}
          files: |
            Connect-A-PIC-Pro-${{ steps.info.outputs.version }}-win-x64.zip
            Connect-A-PIC-Pro-${{ steps.info.outputs.version }}-linux-x64.tar.gz
