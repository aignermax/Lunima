name: Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test ./UnitTests/UnitTests.csproj --no-restore --logger:trx

  build:
    name: Build ${{ matrix.rid }}
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: Connect-A-PIC-Pro-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Connect-A-PIC-Pro-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish
        run: >
          dotnet publish CAP.Desktop/CAP.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from csproj
        id: version
        run: |
          version=$(grep '<Version>' CAP.Desktop/CAP.Desktop.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/' | xargs)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: Connect-A-PIC-Pro-win-x64
          path: win-x64

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: Connect-A-PIC-Pro-linux-x64
          path: linux-x64

      - name: Create archives
        run: |
          cd win-x64 && zip -r ../Connect-A-PIC-Pro-${{ steps.version.outputs.version }}-win-x64.zip . && cd ..
          cd linux-x64 && tar czf ../Connect-A-PIC-Pro-${{ steps.version.outputs.version }}-linux-x64.tar.gz . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: Connect-A-PIC Pro v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated build from main branch.

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}
          files: |
            Connect-A-PIC-Pro-${{ steps.version.outputs.version }}-win-x64.zip
            Connect-A-PIC-Pro-${{ steps.version.outputs.version }}-linux-x64.tar.gz
