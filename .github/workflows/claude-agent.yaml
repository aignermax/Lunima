name: Claude Agent - Issue Implementation

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  implement-issue:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'agent-task')

    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: claude-agent-${{ github.event.issue.number }}
      cancel-in-progress: false

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Run Claude Code Agent
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.CAP_GH_TOKEN || secrets.GITHUB_TOKEN }}
          label_trigger: "agent-task"
          claude_args: |
            --max-turns 150
            --allowedTools "Bash(dotnet build:*),Bash(dotnet test:*),Bash(dotnet restore:*),Bash(git *),Bash(gh pr create:*),Bash(gh pr list:*),Bash(gh pr view:*),Bash(gh label create:*),Bash(gh api:*),Edit,Read,Write,Glob,Grep"
          prompt: |
            You are implementing issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ## Instructions
            Read CLAUDE.md FIRST — it contains ALL project conventions, architecture patterns,
            the vertical slice requirement, build commands, branch naming, and PR format.
            Do NOT deviate from those rules. Everything you need is in that file.

            ## Issue Body
            ${{ github.event.issue.body }}

            ## Efficiency Rules (save tokens and time)
            - PLAN before coding: decide which files to create/modify, then execute
            - Read multiple files in parallel when possible (batch tool calls)
            - Don't read files you don't need — use Glob/Grep to find the right ones first
            - Don't re-read files you've already read
            - If dotnet build fails, fix ALL errors at once, not one at a time
            - Create the PR as your LAST action — don't waste turns if it fails

      - name: Label PR with agent-pr
        if: always() && steps.claude.outputs.branch_name
        env:
          GH_TOKEN: ${{ secrets.CAP_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Create label if it doesn't exist
          gh label create agent-pr \
            --description "PR created by Claude Code agent" \
            --color "7057ff" 2>/dev/null || true

          # Find and label the PR
          PR_NUMBER=$(gh pr list \
            --head "${{ steps.claude.outputs.branch_name }}" \
            --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "agent-pr"
          fi
