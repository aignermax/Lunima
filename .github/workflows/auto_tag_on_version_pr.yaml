name: Auto-Tag on Version PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  create_tag:
    # Only run if PR was merged (not just closed) and title starts with "chore: update version"
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore: update version')
    name: Create Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from csproj
        id: version
        run: |
          version=$(grep '<Version>' CAP.Desktop/CAP.Desktop.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/' | xargs)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Extracted version: $version"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping tag creation"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag v${{ steps.version.outputs.version }} does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          echo "✅ Created and pushed tag v${{ steps.version.outputs.version }}"
          echo "Tag pushed successfully."

      - name: Trigger Build & Publish
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            --input - <<'EOF'
          {
            "event_type": "release-from-auto-tag",
            "client_payload": {
              "tag": "v${{ steps.version.outputs.version }}",
              "version": "${{ steps.version.outputs.version }}",
              "sha": "${{ github.event.pull_request.merge_commit_sha }}"
            }
          }
          EOF
          echo "✅ Triggered Build & Publish for v${{ steps.version.outputs.version }}"
